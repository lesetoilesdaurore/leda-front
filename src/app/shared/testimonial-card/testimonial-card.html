<div class="bg-surface-light p-8 rounded-2xl border border-border-light shadow-sm relative h-full flex flex-col">
  <span class="material-symbols-outlined absolute top-6 right-6 text-primary/20 text-5xl">format_quote</span>
  <div class="flex gap-1 text-primary mb-4">
    <span class="material-symbols-outlined text-sm filled">star</span>
    <span class="material-symbols-outlined text-sm filled">star</span>
    <span class="material-symbols-outlined text-sm filled">star</span>
    <span class="material-symbols-outlined text-sm filled">star</span>
    <span class="material-symbols-outlined text-sm filled">star</span>
  </div>

  <div class="relative z-10 flex-1 mb-6">
    <p class="text-gray-600" [class.mb-3]="isExpandable()">{{ displayedQuote() }}</p>

    @if (isExpandable()) {
      <button
        type="button"
        class="text-sm font-semibold text-primary hover:underline"
        [attr.aria-expanded]="expanded()"
        (click)="toggleExpanded()">
        {{ expanded() ? 'Voir moins' : 'Lire l\'avis complet' }}
      </button>
    }
  </div>

  <div class="flex items-center gap-4 mt-auto">
    @if (data().avatarUrl) {
      <div
        class="w-10 h-10 rounded-full bg-gray-200 bg-cover bg-center"
        [style.background-image]="'url(' + data().avatarUrl + ')'">
      </div>
    } @else {
      <div class="w-10 h-10 rounded-full bg-primary/15 text-primary flex items-center justify-center font-bold text-sm uppercase">
        {{ data().avatarInitial || '?' }}
      </div>
    }
    <div>
      <p class="font-bold text-sm">{{ data().name }}</p>
      <p class="text-xs text-gray-500">{{ data().role }}</p>
    </div>
  </div>
</div>
