<section class="w-full px-4 md:px-10 py-16 md:py-24 max-w-[1280px] mx-auto" id="testimonials">
  <div class="text-center mb-16">
    <h2 class="text-3xl font-bold mb-4">Témoignages Clients</h2>
    <div class="h-1 w-20 bg-primary mx-auto rounded-full"></div>
  </div>

  <!-- Carousel Container -->
  <div class="relative">
    <!-- Testimonials Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-stretch">
      @for (testimonial of visibleTestimonials(); track testimonial.name) {
        <app-testimonial-card [data]="testimonial" />
      }
    </div>

    <!-- Navigation Buttons -->
    @if (testimonials.length > 3) {
      <div class="flex justify-center items-center gap-4 mt-8">
        <button
          type="button"
          (click)="goPrev()"
          [disabled]="!canGoPrev()"
          class="flex items-center justify-center w-10 h-10 rounded-full border border-primary text-primary hover:bg-primary hover:text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-transparent disabled:hover:text-primary"
          aria-label="Avis précédent">
          <span class="material-symbols-outlined text-lg">chevron_left</span>
        </button>

        <div class="flex gap-2">
          @for (i of ([] | slice:0:(totalPages())); track i) {
            <button
              type="button"
              (click)="currentIndex.set(i)"
              [class.bg-primary]="currentIndex() === i"
              [class.bg-gray-300]="currentIndex() !== i"
              class="w-2 h-2 rounded-full transition-colors"
              [attr.aria-label]="'Aller aux avis ' + (i + 1)"
              [attr.aria-current]="currentIndex() === i">
            </button>
          }
        </div>

        <button
          type="button"
          (click)="goNext()"
          [disabled]="!canGoNext()"
          class="flex items-center justify-center w-10 h-10 rounded-full border border-primary text-primary hover:bg-primary hover:text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-transparent disabled:hover:text-primary"
          aria-label="Avis suivant">
          <span class="material-symbols-outlined text-lg">chevron_right</span>
        </button>
      </div>
    }
  </div>
</section>
